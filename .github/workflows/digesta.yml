---
name: digesta bot

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 1 1 * *"

jobs:
  image-update:
    name: image digest update
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: chainguard-dev/digestabot@33d0b78e580aa0c83fe188eb3dfad6611b662479
        with:
          title-for-pr: 'build(Dockerfile): bump python latest tag digest'
          commit-message: 'build(Dockerfile): bump python latest tag digest'
          labels-for-pr: dependencies, docker
          token: ${{ secrets.GITHUB_TOKEN }}
